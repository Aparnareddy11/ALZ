name: AKS-Arc-Runners

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: terraform-arc-${{ github.ref }}
  cancel-in-progress: true

env:
  TF_IN_AUTOMATION: true

jobs:
  plan:
    name: Terraform Plan
    runs-on: arc-runner-set  # Update this to match your AKS Arc runner label
    container:
      image: mcr.microsoft.com/azure-cli:latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Terraform
        run: |
          apt-get update && apt-get install -y unzip curl
          curl -fsSL https://releases.hashicorp.com/terraform/1.9.0/terraform_1.9.0_linux_amd64.zip -o terraform.zip
          unzip terraform.zip
          mv terraform /usr/local/bin/
          terraform version

      - name: Azure Login (Workload Identity)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform Init
        run: terraform init
        working-directory: alz

      - name: Terraform Format Check
        run: terraform fmt -check -recursive
        working-directory: alz

      - name: Terraform Validate
        run: terraform validate
        working-directory: alz

      - name: Terraform Plan
        run: terraform plan -out=tfplan
        working-directory: alz

      - name: Upload plan artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-arc
          path: alz/tfplan

  apply:
    name: Terraform Apply
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    needs: plan
    runs-on: arc-runner-set  # Update this to match your AKS Arc runner label
    container:
      image: mcr.microsoft.com/azure-cli:latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Terraform
        run: |
          apt-get update && apt-get install -y unzip curl
          curl -fsSL https://releases.hashicorp.com/terraform/1.9.0/terraform_1.9.0_linux_amd64.zip -o terraform.zip
          unzip terraform.zip
          mv terraform /usr/local/bin/
          terraform version

      - name: Azure Login (Workload Identity)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Preflight - verify management group access
        shell: bash
        env:
          TARGET_MG_ID: ${{ secrets.AZURE_MANAGEMENT_GROUP_ID }}
        run: |
          set -euo pipefail
          if [ -n "${TARGET_MG_ID:-}" ]; then
            SCOPE="/providers/Microsoft.Management/managementGroups/${TARGET_MG_ID}"
            echo "Checking access to configured management group: ${SCOPE}"
            if ! az rest --method get --url "https://management.azure.com${SCOPE}?api-version=2023-04-01" >/dev/null; then
              echo "Management group preflight failed for configured scope ${SCOPE}."
              echo "Ensure the workload identity has read/write permissions on this management group."
              exit 1
            fi
            echo "Management group preflight passed for ${SCOPE}."
          else
            echo "AZURE_MANAGEMENT_GROUP_ID secret not set. Skipping management group preflight."
          fi

      - name: Terraform Init
        run: terraform init
        working-directory: alz

      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan-arc
          path: alz

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan
        working-directory: alz

      - name: Upload state artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfstate-arc
          path: |
            alz/terraform.tfstate
            terraform.tfstate.backup
