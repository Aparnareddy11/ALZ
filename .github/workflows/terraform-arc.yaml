name: AKS-Arc-Runners

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Terraform CI/CD"]
    types: [completed]

permissions:
  contents: read
  id-token: write
  actions: read

concurrency:
  group: terraform-arc-${{ github.ref }}
  cancel-in-progress: true

env:
  TF_IN_AUTOMATION: true
  ARM_USE_OIDC: true
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  TFSTATE_STORAGE_ACCOUNT_NAME: teststg252911
  TFSTATE_RESOURCE_GROUP_NAME: ${{ secrets.TFSTATE_RESOURCE_GROUP_NAME || 'Harsha-RG' }}
  TFSTATE_CONTAINER_NAME: ${{ secrets.TFSTATE_CONTAINER_NAME || 'tfstate' }}
  TFSTATE_KEY: terraform-alz.tfstate

jobs:
  wait-for-arc-runner:
    name: Wait For ARC Runner
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest
    steps:
      - name: Wait until ARC runner label is online
        id: wait
        uses: actions/github-script@v7
        env:
          ARC_LABEL: aks-arc-runners
          MAX_ATTEMPTS: "20"
          SLEEP_SECONDS: "30"
        with:
          script: |
            const arcLabel = process.env.ARC_LABEL;
            const maxAttempts = Number(process.env.MAX_ATTEMPTS || 20);
            const sleepSeconds = Number(process.env.SLEEP_SECONDS || 30);
            const { owner, repo } = context.repo;

            for (let attempt = 1; attempt <= maxAttempts; attempt++) {
              const res = await github.rest.actions.listSelfHostedRunnersForRepo({
                owner,
                repo,
                per_page: 100
              });

              const hasOnlineArcRunner = res.data.runners.some((r) => {
                const labels = (r.labels || []).map((l) => l.name);
                return r.status === 'online' && labels.includes(arcLabel);
              });

              if (hasOnlineArcRunner) {
                core.info(`Found online ARC runner label '${arcLabel}' on attempt ${attempt}/${maxAttempts}.`);
                return;
              }

              core.warning(`Attempt ${attempt}/${maxAttempts}: no online runner for label '${arcLabel}'.`);
              if (attempt < maxAttempts) {
                await new Promise((resolve) => setTimeout(resolve, sleepSeconds * 1000));
              }
            }

            core.setFailed(`No online ARC runner found with label '${arcLabel}' after ${maxAttempts * sleepSeconds} seconds. Run Terraform CI/CD first and verify ARC controller/listener pods are healthy.`);

  plan:
    name: Terraform Plan
    needs: wait-for-arc-runner
    runs-on:
      - self-hosted
      - aks-arc-runners
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Azure CLI
        run: |
          curl -sL https://aka.ms/InstallAzureCLIDeb | sudo bash
          echo "/usr/bin" >> $GITHUB_PATH

      - name: Verify Azure CLI
        run: az version

      - name: Install Terraform
        run: |
          curl -fsSL https://releases.hashicorp.com/terraform/1.12.0/terraform_1.12.0_linux_amd64.zip -o terraform.zip
          unzip -o terraform.zip
          chmod +x terraform
          sudo mv terraform /usr/local/bin/
          terraform version

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform Init
        run: |
          terraform init -reconfigure \
            -backend-config="resource_group_name=${TFSTATE_RESOURCE_GROUP_NAME}" \
            -backend-config="storage_account_name=${TFSTATE_STORAGE_ACCOUNT_NAME}" \
            -backend-config="container_name=${TFSTATE_CONTAINER_NAME}" \
            -backend-config="key=${TFSTATE_KEY}" \
            -backend-config="use_oidc=true" \
            -backend-config="use_azuread_auth=true"
        working-directory: alz

      - name: Terraform Format Check
        run: terraform fmt -check -recursive
        working-directory: alz

      - name: Terraform Validate
        run: terraform validate
        working-directory: alz

      - name: Terraform Plan
        run: terraform plan -out=tfplan
        working-directory: alz

      - name: Upload plan artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-arc
          path: alz/tfplan

  apply:
    name: Terraform Apply
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    needs: [wait-for-arc-runner, plan]
    runs-on:
      - self-hosted
      - aks-arc-runners

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Azure CLI
        run: |
          curl -sL https://aka.ms/InstallAzureCLIDeb | sudo bash
          echo "/usr/bin" >> $GITHUB_PATH

      - name: Verify Azure CLI
        run: az version

      - name: Install Terraform
        run: |
          curl -fsSL https://releases.hashicorp.com/terraform/1.12.0/terraform_1.12.0_linux_amd64.zip -o terraform.zip
          unzip -o terraform.zip
          chmod +x terraform
          sudo mv terraform /usr/local/bin/
          terraform version

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Preflight - verify management group access
        shell: bash
        env:
          TARGET_MG_ID: ${{ secrets.AZURE_MANAGEMENT_GROUP_ID }}
        run: |
          set -euo pipefail
          if [ -n "${TARGET_MG_ID:-}" ]; then
            SCOPE="/providers/Microsoft.Management/managementGroups/${TARGET_MG_ID}"
            echo "Checking access to configured management group: ${SCOPE}"
            if ! az rest --method get --url "https://management.azure.com${SCOPE}?api-version=2023-04-01" >/dev/null; then
              echo "Management group preflight failed for configured scope ${SCOPE}."
              echo "Ensure the workload identity has read/write permissions on this management group."
              exit 1
            fi
            echo "Management group preflight passed for ${SCOPE}."
          else
            echo "AZURE_MANAGEMENT_GROUP_ID secret not set. Skipping management group preflight."
          fi

      - name: Terraform Init
        run: |
          terraform init -reconfigure \
            -backend-config="resource_group_name=${TFSTATE_RESOURCE_GROUP_NAME}" \
            -backend-config="storage_account_name=${TFSTATE_STORAGE_ACCOUNT_NAME}" \
            -backend-config="container_name=${TFSTATE_CONTAINER_NAME}" \
            -backend-config="key=${TFSTATE_KEY}" \
            -backend-config="use_oidc=true" \
            -backend-config="use_azuread_auth=true"
        working-directory: alz

      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan-arc
          path: alz

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan
        working-directory: alz

